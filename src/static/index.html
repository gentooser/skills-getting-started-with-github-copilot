<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mergington High School Activities</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <h1>Mergington High School</h1>
      <h2>Extracurricular Activities</h2>
      <button
        id="theme-toggle"
        type="button"
        class="theme-toggle"
        aria-pressed="false"
        aria-label="Toggle dark mode"
        title="Toggle dark mode"
      >
        <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M12 4a1 1 0 0 1 1 1v1.2a1 1 0 1 1-2 0V5a1 1 0 0 1 1-1Zm0 12.8a1 1 0 0 1 1 1V19a1 1 0 1 1-2 0v-1.2a1 1 0 0 1 1-1Zm8-4.8a1 1 0 0 1 0 2h-1.2a1 1 0 1 1 0-2H20ZM6.2 12a1 1 0 1 1 0 2H5a1 1 0 1 1 0-2h1.2Zm10.04-5.46a1 1 0 0 1 1.42 0l.86.86a1 1 0 1 1-1.42 1.42l-.86-.86a1 1 0 0 1 0-1.42ZM7.9 14.88a1 1 0 0 1 1.42 0l.86.86a1 1 0 1 1-1.42 1.42l-.86-.86a1 1 0 0 1 0-1.42Zm9.76 2.28a1 1 0 0 1-1.42 0l-.86-.86a1 1 0 1 1 1.42-1.42l.86.86a1 1 0 0 1 0 1.42ZM10.18 8.7a1 1 0 0 1-1.42 0l-.86-.86A1 1 0 1 1 9.32 6.4l.86.86a1 1 0 0 1 0 1.42ZM12 8a4 4 0 1 1 0 8 4 4 0 0 1 0-8Z"/>
        </svg>
        <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
          <path d="M14.8 3.5a1 1 0 0 1 .95 1.29A7.5 7.5 0 1 0 19.2 14a1 1 0 0 1 1.22 1.36A9.5 9.5 0 1 1 13.45 2.4a1 1 0 0 1 1.35 1.1Z"/>
        </svg>
        <span class="sr-only">Toggle dark mode</span>
      </button>
    </header>

    <main>
      <section id="activities-container">
        <h3>Available Activities</h3>
        <div id="activities-list">
          <!-- Activities will be loaded here -->
          <p>Loading activities...</p>
        </div>
      </section>

      <section id="signup-container">
        <h3>Sign Up for an Activity</h3>
        <form id="signup-form">
          <div class="form-group">
            <label for="email">Student Email:</label>
            <input type="email" id="email" required placeholder="your-email@mergington.edu" />
          </div>
          <div class="form-group">
            <label for="activity">Select Activity:</label>
            <select id="activity" required>
              <option value="">-- Select an activity --</option>
              <!-- Activity options will be loaded here -->
            </select>
          </div>
          <button type="submit">Sign Up</button>
        </form>
        <div id="message" class="hidden"></div>
      </section>
    </main>

    <footer>
      <p>&copy; 2023 Mergington High School</p>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
